spring:
  application:
    name: encurtaai

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/encurtaai}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger

server:
  port: 8080

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

  pagination:
    default-size: 25
    max-size: 200
    default-sort: createdAt
    default-direction: DESC